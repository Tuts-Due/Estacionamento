# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/estacionamento?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - usar "validate" para não conflitar com Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson - serializar LocalDateTime corretamente
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Porta da aplicação (o simulador envia para localhost:3003/webhook)
server.port=3003

# URL do simulador da garagem (container Docker expõe em 8282 por padrão)
garage.simulator.url=http://localhost:8282

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
