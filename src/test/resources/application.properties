# ==============================================================
# Configuração EXCLUSIVA para testes automatizados
# Usa H2 em memória para não depender de MySQL rodando localmente
# O banco de PRODUÇÃO é MySQL (ver src/main/resources/application.properties)
# ==============================================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# create-drop: cria o schema ao iniciar e apaga ao terminar cada teste
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway desabilitado nos testes — o ddl-auto já cria as tabelas via entidades JPA
spring.flyway.enabled=false

# URL fictícia — GarageService é mockado nos testes, não chama o simulador real
garage.simulator.url=http://localhost:9999
